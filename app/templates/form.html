{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white border-bottom-0 pt-4 pb-0">
                <h3 class="fw-bold text-primary mb-0">
                    <!-- 如果有傳入舊的 book.id，代表是編輯模式；否則是新增模式 -->
                    {% if book and book.id %}編輯筆記{% else %}新增筆記{% endif %}
                </h3>
            </div>
            <div class="card-body p-4">
                <!-- 動態判斷表單要 POST 送到哪一個網址 -->
                <form action="{% if book and book.id %}{{ url_for('book_bp.edit_submit', book_id=book.id) }}{% else %}{{ url_for('book_bp.add_submit') }}{% endif %}" method="POST">
                    
                    <div class="mb-3">
                        <label for="title" class="form-label fw-bold">書名 <span class="text-danger">*</span></label>
                        <!-- 利用 value 屬性填入舊資料 (如果有的話) -->
                        <input type="text" class="form-control" id="title" name="title" value="{{ book.title if book else '' }}" required placeholder="例如：哈利波特">
                    </div>

                    <div class="mb-3">
                        <label for="author" class="form-label fw-bold">作者</label>
                        <input type="text" class="form-control" id="author" name="author" value="{{ book.author if book else '' }}" placeholder="例如：J.K. 羅琳">
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="rating" class="form-label fw-bold">評分 (1-5 星)</label>
                            <select class="form-select" id="rating" name="rating">
                                <option value="0" {% if not book or book.rating == 0 %}selected{% endif %}>未評分</option>
                                <option value="1" {% if book and book.rating == 1 %}selected{% endif %}>1 顆星 - 不推薦</option>
                                <option value="2" {% if book and book.rating == 2 %}selected{% endif %}>2 顆星 - 勉強接受</option>
                                <option value="3" {% if book and book.rating == 3 %}selected{% endif %}>3 顆星 - 普通</option>
                                <option value="4" {% if book and book.rating == 4 %}selected{% endif %}>4 顆星 - 值得一看</option>
                                <option value="5" {% if book and book.rating == 5 %}selected{% endif %}>5 顆星 - 神作推薦</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="comment" class="form-label fw-bold">評分留言 (短評)</label>
                            <input type="text" class="form-control" id="comment" name="comment" value="{{ book.comment if book else '' }}" placeholder="例如：翻譯待加強">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="review" class="form-label fw-bold">閱讀心得</label>
                        <textarea class="form-control" id="review" name="review" rows="6" placeholder="寫下你的感想與收穫...">{{ book.review if book else '' }}</textarea>
                    </div>

                    <div class="d-flex justify-content-end gap-2">
                        <a href="{{ url_for('book_bp.index') }}" class="btn btn-secondary">取消</a>
                        <button type="submit" class="btn btn-primary px-4">儲存筆記</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
